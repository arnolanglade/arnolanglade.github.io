id: "portfolio"

content:
  - image:
      src: "seasoned-guidance-on-your-projects.png"
      alt: "When complexity takes over"
    title: "When complexity takes over"
    text: |
      Stressful deployments.
      Features take too long to ship.
      Recurring incidents.
      Hiring more developers does not increase velocity.
      A technical foundation that becomes risky to evolve.
      
      It is almost never a motivation or skills problem.
      Most of the time, **the foundations, practices, and organization no longer scale.**

  - image:
      src: "boost-your-team-skills-or-shift-their-mindset.png"
      alt: "But what is the cost?"
    title: "But what is the cost?"
    text: |
      Each release becomes riskier.
      Technical debt slows down innovation.
      Teams lose confidence.
      Adding developers does not speed things up.
      Features reach production slowly.
          
      Result: **you deliver less, more slowly, and with more incidents.**

  - image:
      src: "scale-faster-than-your-competitor.png"
      alt: "My role?"
    title: "My role?"
    text: |
      I work as a CTO / Head of Engineering on demand to restore the ability to deliver — without stopping the product.
      
      With 15 years of experience on critical systems and growing startups, I help teams take back control, both technically and organizationally.
      
      In practice, I work closely with teams to:
      * dentify what really slows down execution (beyond the symptoms)
      * align business vision with technical decisions
      * reduce the complexity that slows teams down
      * secure deployments
      * evolve the system step by step, without a “big refactor”
      
      Always close to the teams, so the changes last.

  - image:
    title: What people I worked with say
    type: "testimonials"

  - image:
      src: "bridge-the-gap-between-your-ech-and-non-tech-team-members.png"
      alt: "Who is this for?"
    title: "Who is this for?"
    text: |
      I mainly work with:
      * software editors,
      * start-ups,
      * companies where technical and organizational complexity slows down growth,
      
      who want to:
      * restore a predictable delivery capacity
      * secure their deployments
      * accelerate in a sustainable way
      * scale without teams stepping on each other
      * or build a product from scratch on solid foundations

  - image:
      src: "hire-me.png"
      alt: "Let’s talk about your situation"
    title: "Let’s talk about your situation"
    text: |
      Are your deliveries becoming a challenge?
      Do you feel your projects are moving too slowly?
      
      Let’s talk for 30 minutes, with no commitment.
    buttons:
