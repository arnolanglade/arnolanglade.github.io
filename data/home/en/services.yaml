content:
  - image:
      src: "seasoned-guidance-on-your-projects.png"
      alt: "When your application slows down delivery"
    title: "When your application slows down delivery"
    text: |
      Stressful deployments.
      Recurring incidents.
      A legacy application that slows down every change.
      
      It is almost never a lack of motivation or skills.<br>
      Most of the time, **the foundations, practices, and organization no longer scale.**

  - image:
      src: "boost-your-team-skills-or-shift-their-mindset.png"
      alt: "The problem with a poorly managed application?"
    title: "The problem with a poorly managed application?"
    text: |
      The real cost of inaction:
      
      * each delivery becomes riskier,
      * technical debt slows down innovation,
      * teams lose confidence,
      * adding more developers does not speed things up.
      
      Result: **you deliver less, more slowly, and with more incidents.**

  - image:
      src: "scale-faster-than-your-competitor.png"
      alt: "My role?"
    title: "My role?"
    text: |
      I support teams as a **Software Architect and CTO on-demand**, with 15 years of experience on **critical legacy applications** as well as **from-scratch products**.
      
      My goal: **build strong foundations without stopping delivery.**
      
      In practice, I work closely with teams to:
      * identify what is really slowing down delivery (beyond the symptoms),
      * evolve an existing application **step by step**, without a “big refactor”,
      * improve practices (architecture, testing, CI/CD, collaboration),
      * build solid foundations when starting a product from scratch.
      
      Often through **pair or mob programming**, to make sure changes last.

  - image:
    title: What people I worked with say
    type: "testimonials"

  - image:
      src: "bridge-the-gap-between-your-ech-and-non-tech-team-members.png"
      alt: "Who is this for?"
    title: "Who is this for?"
    text: |
      I mainly work with:
      * software editors,
      * start-ups,
      * companies with an existing application that has become hard to evolve,
      
      who want to:
      * regain control over their legacy,
      * make deployments safer,
      * speed up sustainably,
      * or build a product from scratch on solid foundations.

  - image:
      src: "hire-me.png"
      alt: "Let’s talk about your situation"
    title: "Let’s talk about your situation"
    text: |
      Are your deliveries becoming a challenge?
      Do you feel your projects are moving too slowly?
      
      Let’s talk for 30 minutes, with no commitment.
