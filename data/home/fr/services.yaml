enabled: true
id: "portfolio"

content:
  - image:
      src: "seasoned-guidance-on-your-projects.png"
      alt: "Quand votre application freine vos livraisons"
    title: "Quand votre application freine vos livraisons"
    text: |
      Mises en production stressantes.
      Incidents à répétition.
      Une application legacy qui ralentit chaque évolution.
      
      Ce n’est presque jamais un problème de motivation ou de compétences.<br>
      Le plus souvent, **les fondations techniques, les pratiques et l’organisation ne suivent plus.**

  - image:
      src: "boost-your-team-skills-or-shift-their-mindset.png"
      alt: "Le problème avec une application mal gérée ?"
    title: "Le problème avec une application mal gérée ?"
    text: |
      Le coût réel de l’inaction:
      
      * chaque livraison devient plus risquée,
      * la dette technique étouffe l’innovation,
      * les équipes perdent confiance,
      * ajouter des développeurs n’accélère rien.
    
      Résultat : **vous livrez moins, plus lentement, avec plus d’incidents.**

  - image:
      src: "scale-faster-than-your-competitor.png"
      alt: "Mon rôle ?"
    title: "Mon rôle ?"
    text: |
      J’accompagne les équipes en tant qu’**Architecte logiciel et CTO on-demand**, avec 15 ans d’expérience sur des **applications legacy critiques** comme sur des **produits from scratch**.
      
      Mon objectif : **remettre des bases solides sans arrêter le delivery.**
      
      Concrètement, je travaille aux côtés des équipes pour :
      * identifier ce qui freine réellement les livraisons (au-delà des symptômes),
      * faire évoluer une application existante **pas à pas**, sans “big refacto”,
      * améliorer les pratiques (architecture, tests, CI/CD, collaboration),
      * poser des fondations saines quand il faut construire un produit de zéro.
      
      Souvent en **pair ou mob programming**, pour que les changements durent.

  - image:
    title: Ce que disent les personnes avec lesquelles j’ai travaillé
    type: "testimonials"

  - image:
      src: "bridge-the-gap-between-your-ech-and-non-tech-team-members.png"
      alt: "Pour qui ?"
    title: "Pour qui ?"
    text: | 
      J’accompagne principalement :
      * des éditeurs de logiciels,
      * des start-ups,
      * des entreprises avec une application existante devenue difficile à faire évoluer,
      
      qui veulent :
      * reprendre le contrôle sur leur legacy,
      * sécuriser leurs mises en production,
      * accélérer durablement,
      * ou construire un produit from scratch sur des bases solides.

  - image:
      src: "hire-me.png"
      alt: "Parlons de votre situation"
    title: "Parlons de votre situation"
    text: |
      Vos livraisons vous donnent du fil à retordre ?
      Vous sentez que la technique freine la stratégie ?
      
      Échangeons 30 minutes, sans engagement.
    buttons:
      - label: "Échangeons 30 minutes"
        url: "https://meetings-eu1.hubspot.com/arnaud-langlade"
