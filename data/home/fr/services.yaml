id: "portfolio"

content:
  - image:
      src: "seasoned-guidance-on-your-projects.png"
      alt: "Quand la complexité prend le dessus"
    title: "Quand la complexité prend le dessus"
    text: |
      Mises en production stressantes.
      Les fonctionnalités mettent trop de temps à sortir
      Incidents à répétition.
      Recrutements qui n’augmentent pas la vélocité.
      Une base technique qui devient risquée à faire évoluer.
      
      Ce n’est presque jamais un problème de motivation ou de compétences.
      Le plus souvent, **les fondations techniques, les pratiques et l’organisation ne suivent plus.**

  - image:
      src: "boost-your-team-skills-or-shift-their-mindset.png"
      alt: "Mais quel est le coût de tout ça ?"
    title: "Mais quel est le coût de tout ça ?"
    text: |
      Chaque livraison devient plus risquée.
      La dette technique étouffe l’innovation.
      Les équipes perdent confiance.
      Ajouter des développeurs n’accélère rien.
      Les fonctionnalités arrivent lentement en production.

      Résultat : **vous livrez moins, plus lentement, avec plus d’incidents.**

  - image:
      src: "scale-faster-than-your-competitor.png"
      alt: "Mon rôle ?"
    title: "Mon rôle ?"
    text: |
      J’interviens en tant que CTO / Head of Engineering on demand pour restaurer la capacité à livrer sans stopper le produit.
      
      Avec 15 ans d’expérience sur des systèmes critiques et des startups en croissance, j’aide les équipes à reprendre le contrôle, techniquement et organisationnellement.

      Concrètement, je travaille aux côtés des équipes pour :
      * identifier ce qui freine réellement l’exécution (au-delà des symptômes),
      * aligner la vision business et les décisions techniques,
      * réduire la complexité qui ralentit les équipes,
      * sécuriser les mises en production,
      * faire évoluer le système pas à pas, sans “big refacto”.
  

       Toujours au plus près du terrain, pour que les changements durent.

  - image:
    title: Ce que disent les personnes avec lesquelles j’ai travaillé
    type: "testimonials"

  - image:
      src: "bridge-the-gap-between-your-ech-and-non-tech-team-members.png"
      alt: "Pour qui ?"
    title: "Pour qui ?"
    text: | 
      J’accompagne principalement :
      * des éditeurs de logiciels,
      * des start-ups,
      * des entreprises dont la complexité technique et organisationnelle freine la croissance,
      
      qui veulent :
      * restaurer une capacité à livrer prévisible,
      * sécuriser leurs mises en production,
      * accélérer durablement,
      * scaler sans que les équipes se marchent dessus,
      * ou construire un produit from scratch sur des bases solides.

  - image:
      src: "hire-me.png"
      alt: "Parlons de votre situation"
    title: "Parlons de votre situation"
    text: |
      Vos livraisons vous donnent du fil à retordre ?
      Vous avez l’impression que les projets avancent trop lentement ?
      
      Échangeons 30 minutes, sans engagement.
    buttons:
      - label: "Prendre rendez-vous"
        url: "https://calendly.com/arnaud-langlade/30min"
